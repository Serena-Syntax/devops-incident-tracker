name: CI/CD Incident Tracker Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Quellcode auschecken
        uses: actions/checkout@v4

      - name: Node.js Umgebung einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pipeline Validierung
        run: |
          echo "CI/CD Pipeline erfolgreich ausgefuehrt!"
          echo "Incident Tracker App ist bereit fuer Deployment."