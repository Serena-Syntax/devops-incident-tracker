<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Incident Tracker Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
<header class="pb-3 mb-4 border-bottom d-flex justify-content-between align-items-center">
<h1 class="text-primary fw-bold">🚨 Incident Management Dashboard</h1>
<span class="badge bg-success fs-6">System Online</span>
</header>

<div class="card mb-4 shadow-sm">
<div class="card-header bg-white">
<h5 class="card-title mb-0">Neuen Vorfall melden</h5>
</div>
<div class="card-body">
<form id="incidentForm" class="row g-3">
<div class="col-md-7">
<input type="text" id="title" class="form-control" placeholder="Beschreibung des Vorfalls..." required>
</div>
<div class="col-md-3">
<select id="severity" class="form-select">
<option value="LOW">Niedrig (LOW)</option>
<option value="MEDIUM">Mittel (MEDIUM)</option>
<option value="HIGH">Hoch (HIGH)</option>
</select>
</div>
<div class="col-md-2">
<button type="submit" class="btn btn-primary w-100">Erstellen</button>
</div>
</form>
</div>
</div>

<div class="card shadow-sm">
<div class="card-header bg-white">
<h5 class="card-title mb-0">Aktuelle Vorfaelle</h5>
</div>
<div class="card-body">
<ul id="incidentList" class="list-group">
<li class="list-group-item text-center text-muted">Vorfaelle werden geladen...</li>
</ul>
</div>
</div>
</div>

<script>
const API_URL = 'http://localhost:5000/api/incidents';

// Abrufen und Anzeigen aller Vorfaelle
async function fetchIncidents() {
try {
const res = await fetch(API_URL);
const data = await res.json();
const list = document.getElementById('incidentList');
list.innerHTML = '';

if (data.length === 0) {
list.innerHTML = '<li class="list-group-item text-center text-muted">Keine Vorfaelle vorhanden.</li>';
return;
}

data.forEach(inc => {
const badgeClass = inc.severity === 'HIGH' ? 'bg-danger' : inc.severity === 'MEDIUM' ? 'bg-warning text-dark' : 'bg-info text-dark';
const item = document.createElement('li');
item.className = 'list-group-item d-flex justify-content-between align-items-center';
item.innerHTML = `
<div>
<strong>#${inc.id} - ${inc.title}</strong>
<span class="badge ${badgeClass} ms-2">${inc.severity}</span>
</div>
<span class="badge bg-secondary">${inc.status}</span>
`;
list.appendChild(item);
});
} catch (err) {
document.getElementById('incidentList').innerHTML = '<li class="list-group-item text-danger text-center">Fehler beim Laden der Vorfaelle (Backend offline?).</li>';
}
}

// Formular-Einreichung verarbeiten
document.getElementById('incidentForm').addEventListener('submit', async (e) => {
e.preventDefault();
const title = document.getElementById('title').value;
const severity = document.getElementById('severity').value;

await fetch(API_URL, {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ title, severity })
});

document.getElementById('title').value = '';
fetchIncidents();
});

// Beim Laden der Seite ausfuehren
fetchIncidents();
</script>
</body>
</html>
